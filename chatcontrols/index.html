<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube Live Chat HID Controller</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 320px;
            background-color: #1e1e1e;
            border-right: 1px solid #333;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }
        .chat-container {
            flex-grow: 1;
            background-color: #121212;
            display: flex;
            flex-direction: column;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        label {
            font-size: 12px;
            font-weight: bold;
            color: #aaaaaa;
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            background-color: #2d2d2d;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 13px;
        }
        input[type="text"]:focus {
            border-color: #007acc;
            outline: none;
        }
        button {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            background-color: #007acc;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        button:hover {
            background-color: #005999;
        }
        .status {
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
        }
        .connected {
            background-color: #2e7d32;
            color: #fff;
        }
        .disconnected {
            background-color: #c62828;
            color: #fff;
        }
        .log-console {
            flex-grow: 1;
            background-color: #000000;
            font-family: monospace;
            padding: 10px;
            border-radius: 4px;
            overflow-y: auto;
            font-size: 11px;
            color: #00ff00;
            border: 1px solid #333;
            min-height: 150px;
        }
        h3 {
            margin: 0 0 5px 0;
            font-size: 16px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>Configuration</h3>

        <div>
            <label>Phone IP Address:</label>
            <input type="text" id="phoneIp" value="192.168.1.239">
            <button onclick="connectPhone()" style="margin-top: 5px; width: 100%;">Connect Phone</button>
        </div>

        <div id="phoneStatus" class="status disconnected">Phone Disconnected</div>

        <div>
            <label>YouTube Video URL / ID:</label>
            <input type="text" id="ytUrl" placeholder="https://www.youtube.com/watch?v=...">
            <button onclick="loadChat()" style="margin-top: 5px; width: 100%;">Load Live Chat</button>
        </div>

        <div>
            <label>Command Prefix (e.g., !):</label>
            <input type="text" id="prefix" value="!">
        </div>

        <div>
            <label>Blacklist (semicolon separated):</label>
            <input type="text" id="blacklist" value="spam;ban;badword;">
        </div>

        <button onclick="startScraper()" style="background-color: #2e7d32; width: 100%;">Start Scraper</button>

        <h3>Console Log</h3>
        <div id="logConsole" class="log-console">System initialized...</div>
    </div>

    <div class="chat-container">
        <iframe id="chatFrame" src="about:blank"></iframe>
    </div>

    <script>
        let ws;
        let observer;

        function logToConsole(msg) {
            const consoleDiv = document.getElementById('logConsole');
            consoleDiv.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        // Connect to the phone's WebSocket server
        function connectPhone() {
            const ip = document.getElementById('phoneIp').value.trim();
            const statusDiv = document.getElementById('phoneStatus');

            statusDiv.textContent = "Connecting...";
            statusDiv.className = "status";

            ws = new WebSocket(`ws://${ip}:8765`);

            ws.onopen = () => {
                statusDiv.textContent = "Phone Connected";
                statusDiv.className = "status connected";
                logToConsole("Connected to phone WebSocket server.");
            };

            ws.onclose = () => {
                statusDiv.textContent = "Phone Disconnected";
                statusDiv.className = "status disconnected";
                logToConsole("Disconnected from phone.");
            };

            ws.onerror = (err) => {
                statusDiv.textContent = "Connection Error";
                statusDiv.className = "status disconnected";
                logToConsole("WebSocket Error: " + err.message);
            };
        }

        // Extract Video ID and load the Live Chat iframe
        function loadChat() {
            const urlInput = document.getElementById('ytUrl').value.trim();
            let videoId = urlInput;

            if (urlInput.includes('v=')) {
                videoId = urlInput.split('v=')[1].split('&')[0];
            } else if (urlInput.includes('youtu.be/')) {
                videoId = urlInput.split('youtu.be/')[1].split('?')[0];
            } else if (urlInput.includes('/live/')) {
                videoId = urlInput.split('/live/')[1].split('?')[0];
            }

            if (videoId.length !== 11) {
                logToConsole("Error: Invalid YouTube URL or Video ID.");
                return;
            }

            const chatUrl = `https://www.youtube.com/live_chat?v=${videoId}`;
            document.getElementById('chatFrame').src = chatUrl;
            logToConsole(`Loading Live Chat for Video ID: ${videoId}`);
        }

        // Start scraping the iframe DOM
        function startScraper() {
            const iframe = document.getElementById('chatFrame');
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;

            if (!iframeDoc) {
                logToConsole("Error: Cannot access iframe. Make sure the chat is loaded.");
                return;
            }

            const chatContainer = iframeDoc.querySelector('#items.yt-live-chat-item-list-renderer');
            if (!chatContainer) {
                logToConsole("Error: Chat container not found inside iframe yet. Wait for it to load.");
                return;
            }

            if (observer) observer.disconnect();

            logToConsole("=== Starting Live Chat Scraper ===");

            observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    mutation.addedNodes.forEach((node) => {
                        if (node.nodeType === Node.ELEMENT_NODE && node.matches('yt-live-chat-text-message-renderer')) {
                            const authorEl = node.querySelector('#author-name');
                            const messageEl = node.querySelector('#message');

                            if (authorEl && messageEl) {
                                const author = authorEl.textContent.trim();
                                const text = messageEl.textContent.trim();
                                processMessage(author, text);
                            }
                        }
                    });
                });
            });

            observer.observe(chatContainer, { childList: true, subtree: true });
            logToConsole("Scraper is actively monitoring chat messages.");
        }

        // Process and filter incoming messages
        function processMessage(author, text) {
            const prefix = document.getElementById('prefix').value.trim();
            const blacklistInput = document.getElementById('blacklist').value.trim();

            // 1. Check Blacklist
            if (blacklistInput) {
                const bannedWords = blacklistInput.split(';').map(w => w.trim().toLowerCase()).filter(w => w.length > 0);
                const lowerText = text.toLowerCase();
                for (const word of bannedWords) {
                    if (lowerText.includes(word)) {
                        logToConsole(`Blocked message from ${author} (Blacklisted word: "${word}")`);
                        return;
                    }
                }
            }

            // 2. Check Prefix
            if (prefix) {
                if (!text.startsWith(prefix)) {
                    return; // Ignore messages without prefix
                }
                text = text.slice(prefix.length).trim();
            }

            logToConsole(`Processing command from ${author}: "${text}"`);

            // 3. Parse Command Type
            // Expected formats:
            // "mouse -50 0" -> type: "mouse", value: "-50 0"
            // "key ctrl+alt+delete" -> type: "key", value: "ctrl+alt+delete"
            // "text hello world" -> type: "text", value: "hello world"
            const spaceIndex = text.indexOf(' ');
            if (spaceIndex === -1) {
                // Single word command, default to keypress (e.g., "enter", "space")
                sendCommand("key", text);
                return;
            }

            const cmdType = text.substring(0, spaceIndex).toLowerCase();
            const cmdValue = text.substring(spaceIndex + 1).trim();

            if (cmdType === "mouse" || cmdType === "key" || cmdType === "text") {
                sendCommand(cmdType, cmdValue);
            } else {
                // If the first word isn't mouse/key/text, treat the whole thing as a keypress
                sendCommand("key", text);
            }
        }

        // Send command payload to the phone
        function sendCommand(type, value) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const payload = JSON.stringify({ type: type, value: value });
                ws.send(payload);
                logToConsole(`Sent to phone: ${payload}`);
            } else {
                logToConsole(`Error: Cannot send command. Phone is disconnected.`);
            }
        }
    </script>
</body>
</html>
